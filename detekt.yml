# detekt configuration for momo-agent.
#
# Mirrors the ai-router Kotlin SDK's config. Used with
# `buildUponDefaultConfig = true`, so this file only carries the deltas from
# detekt's bundled defaults. Anything not mentioned here keeps its default
# behaviour. Every relaxation below targets test sources and is documented
# with its reason.

build:
  # Fail the build on the first issue.
  maxIssues: 0

formatting:
  # ktlint rules (via detekt-formatting). NoWildcardImports stays ENABLED
  # (its default) so wildcard imports are reported.
  active: true
  NoWildcardImports:
    active: true

complexity:
  # Tests may build whole requests inside a single test function, so they can
  # run long by design. Relax the method-length cap for test sources only.
  LongMethod:
    excludes: ['**/test/**', '**/liveTest/**', '**/containerTest/**']
  # Test classes bundle one function per scenario plus helpers, so they run
  # over the function cap by design. Relax it for test sources only.
  TooManyFunctions:
    excludes: ['**/test/**', '**/liveTest/**', '**/containerTest/**']

style:
  # Tests intentionally hard-code prompts, ports and model strings inline to
  # read as self-contained documentation. Allow magic numbers in test sources
  # only; main code is still held to the default.
  MagicNumber:
    excludes: ['**/test/**', '**/liveTest/**', '**/containerTest/**']
